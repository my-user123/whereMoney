server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: where-money-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/wheremoney}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:123456}
  flyway:
    enabled: true
  jackson:
    default-property-inclusion: non_null

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false

app:
  jwt:
    secret: ${JWT_SECRET:where-money-local-dev-secret-at-least-32-characters}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:10080}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
