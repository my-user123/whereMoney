spring:
  datasource:
    url: jdbc:h2:mem:wheremoney;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: true
    locations: classpath:db/migration/h2

app:
  jwt:
    secret: where-money-test-secret-at-least-32-characters
    expiration-minutes: 7200
  cors:
    allowed-origins: http://localhost:3000
